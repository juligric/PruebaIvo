name: Mi primer pipeline
on: push
jobs:
  calidad:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Bajar el código
        uses: actions/checkout@v4
      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Instalar dependencias
        run: npm install
      - name: Lint
        run: npm run lint
      - name: Correr los tests
        run: npm test
      - name: Build
        run: npm run build
      - name: Chequear secrets (diagnostico)
        run: |
          echo "ORG_ID -> largo: ${#VERCEL_ORG_ID}, empieza con: ${VERCEL_ORG_ID:0:5}"
          echo "PROJECT_ID -> largo: ${#VERCEL_PROJECT_ID}, empieza con: ${VERCEL_PROJECT_ID:0:4}"
      - name: Instalar Vercel CLI
        run: npm install -g vercel
      - name: Bajar config de Vercel
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }} --debug
      - name: Publicar en Vercel
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}