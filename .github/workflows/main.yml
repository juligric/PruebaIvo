name: Mi primer pipeline
on: push
jobs:
  calidad:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Bajar el código
        uses: actions/checkout@v4
      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Instalar dependencias
        run: npm install
      - name: Lint
        run: npm run lint
      - name: Correr los tests
        run: npm test
      - name: Build
        run: npm run build
      - name: Prueba de fuego del token
        run: |
          echo "Acceso a tu usuario (esperamos 200):"
          curl -s -o /dev/null -w "  HTTP %{http_code}\n" -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" "https://api.vercel.com/v2/user"
          echo "Acceso a tu proyecto (esperamos 200):"
          curl -s -o /dev/null -w "  HTTP %{http_code}\n" -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" "https://api.vercel.com/v9/projects/${VERCEL_PROJECT_ID}?teamId=${VERCEL_ORG_ID}"
      - name: Instalar Vercel CLI
        run: npm install -g vercel
      - name: Bajar config de Vercel
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Publicar en Vercel
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}